<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Instagram Profile</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
</head>

<body>
    <main class="page-wrap">
        <div class="container">
            <section class="profile-card">
                <div class="card-inner">
                    <div class="profile-top">
                        <img src="profile.jpg" alt="Profile Picture" class="profile-pic">
                        <div class="profile-head-info">
                            <h2 class="username">Will's Tech</h2>

                            <div class="stats">
                                <div class="stat">
                                    <strong id="posts-count">6</strong>
                                    <span class="stat-label">posts</span>
                                </div>
                                <div class="stat">
                                    <strong id="followers-count">350</strong>
                                    <span class="stat-label">followers</span>
                                </div>
                                <div class="stat">
                                    <strong id="following-count">150</strong>
                                    <span class="stat-label">following</span>
                                </div>
                            </div>

                            <p class="bio">Code is poetry✨</p>

                            <div class="action-buttons">
                                <button class="follow-btn">Follow</button>
                                <button class="message-btn">Message</button>
                                <button class="more-btn">⋯</button>
                            </div>
                        </div>
                    </div>

                    <div class="post-grid">
                        <div class="post"><img src="https://picsum.photos/800/800?random=1" alt="Post 1"></div>
                        <div class="post"><img src="https://picsum.photos/800/800?random=2" alt="Post 2"></div>
                        <div class="post"><img src="https://picsum.photos/800/800?random=3" alt="Post 3"></div>
                        <div class="post"><img src="https://picsum.photos/800/800?random=4" alt="Post 4"></div>
                        <div class="post"><img src="https://picsum.photos/800/800?random=5" alt="Post 5"></div>
                        <div class="post"><img src="https://picsum.photos/800/800?random=6" alt="Post 6"></div>
                    </div>
                </div>
            </section>

        </div>
    </main>

    <div id="modal" class="modal">
        <span id="close">&times;</span>
        <img id="modal-img" alt="Expanded post">
    </div>

    <div id="message-modal" class="message-modal">
        <div class="message-modal-content">
            <div class="message-header">
                <h3>Send Message</h3>
                <span id="message-close" class="close">&times;</span>
            </div>
            <textarea id="message-text" placeholder="Write a message..."></textarea>
            <div class="message-actions">
                <button id="message-send" class="send-btn">Send</button>
            </div>
        </div>
    </div>

    <button id="floating-follow" class="follow-btn floating-follow">Follow</button>

    <script src="script.js"></script>
</body>

</html>
